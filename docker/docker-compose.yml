version: '3.8'
services:
  guild-finance:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8092:8092"
    environment:
      - NATS_URL=nats://nats:4222
      - GUILD_PORT=8092
      - GUILD_NAME=finance
    depends_on:
      - nats
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
